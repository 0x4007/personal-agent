name: "Personal Agent Compute"

on:
  workflow_dispatch:
    inputs:
      stateId:
        description: "State Id"
      eventName:
        description: "Event Name"
      eventPayload:
        description: "Event Payload"
      settings:
        description: "Settings"
      authToken:
        description: "Auth Token"
      ref:
        description: "Ref"
      signature:
        description: "The kernel signature"
      command:
        description: "Command from the Kernel"
        required: false
      testMode:
        description: "Enable test mode (bypass signature verification)"
        type: boolean
        default: true

jobs:
  compute:
    name: "Personal Agent"
    runs-on: ubuntu-24.04
    permissions: write-all
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && 'main' || 'development' }}
    env:
      PLUGIN_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KERNEL_PUBLIC_KEY: ${{ secrets.KERNEL_PUBLIC_KEY }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
      AGENT_OWNER: ${{ github.repository_owner }}
      USER_PAT_FULL: ${{ secrets.PAT_FULL }}
      USER_PAT_READ: ${{ secrets.PAT_READ }}
      # LLM config
      UOS_AI_MODEL: ${{ secrets.UOS_AI_MODEL || 'gpt-5-chat-latest' }}
      UOS_STYLE_EXAMPLES: "6"
      UOS_STYLE_LOOKBACK_DAYS: "365"
      UOS_CONTEXT_FETCH: "1"
      UOS_STYLE_FETCH: "1"
      # Prompt visibility for debugging
      LOG_PROMPT: "1"
      # Enable writing prompt/body/event files for artifact collection
      WRITE_PROMPT_FILE: "1"
      WRITE_EVENT_FILE: "1"
      NODE_ENV: ${{ github.event.inputs.testMode == 'true' && 'local' || 'production' }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node dist/index.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-logs-${{ github.run_id }}
          path: |
            runtime-logs/**
          if-no-files-found: ignore
