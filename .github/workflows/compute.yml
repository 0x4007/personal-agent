name: "Personal Agent Compute"

on:
  workflow_dispatch:
    inputs:
      stateId:
        description: "State Id"
      eventName:
        description: "Event Name"
      eventPayload:
        description: "Event Payload"
      settings:
        description: "Settings"
      authToken:
        description: "Auth Token"
      ref:
        description: "Ref"
      signature:
        description: "The kernel signature"
      command:
        description: "Command from the Kernel"
        required: false
      testMode:
        description: "Enable test mode (bypass signature verification)"
        type: boolean
        default: true

jobs:
  compute:
    name: "Personal Agent"
    runs-on: ubuntu-24.04
    permissions: write-all
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && 'main' || 'development' }}
    env:
      PLUGIN_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KERNEL_PUBLIC_KEY: ${{ secrets.KERNEL_PUBLIC_KEY }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
      AGENT_OWNER: ${{ github.repository_owner }}
      USER_PAT: ${{ secrets.USER_PAT }}
      PI_URL: ${{ secrets.PI_URL }}
      PI_TIMEOUT_MS: 900000
      PI_POST: "false"
      # Debug toggles to capture full inputs and prompt/body in logs
      DEBUG_EVENT: "1"
      DEBUG_EVENT_RAW: "1"
      LOG_PROMPT: "1"
      LOG_PI_BODY: "1"
      LOG_PAYLOAD: "1"
      PROMPT_INCLUDE_EVENT: "1"
      PROMPT_STRIP_URLS: "1"
      WRITE_PROMPT_FILE: "1"
      WRITE_EVENT_FILE: "1"
      NODE_ENV: ${{ github.event.inputs.testMode == 'true' && 'local' || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run personal agent
        uses: ./dist/index.js

      - name: Upload prompt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs-${{ github.run_id }}
          path: |
            runtime-logs/**
          if-no-files-found: ignore
