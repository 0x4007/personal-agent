name: "Personal Agent Compute"

on:
  workflow_dispatch:
    inputs:
      stateId:
        description: "State Id"
      eventName:
        description: "Event Name"
      eventPayload:
        description: "Event Payload"
      settings:
        description: "Settings"
      authToken:
        description: "Auth Token"
      ref:
        description: "Ref"
      signature:
        description: "The kernel signature"
      command:
        description: "Command from the Kernel"
        required: false
      testMode:
        description: "Enable test mode (bypass signature verification)"
        type: boolean
        default: true

jobs:
  compute:
    name: "Personal Agent"
    runs-on: ubuntu-24.04
    permissions: write-all
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && 'main' || 'development' }}
    env:
      PLUGIN_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KERNEL_PUBLIC_KEY: ${{ secrets.KERNEL_PUBLIC_KEY }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
      AGENT_OWNER: ${{ github.repository_owner }}
      USER_PAT: ${{ secrets.USER_PAT }}
      PI_URL: ${{ secrets.PI_URL }}
      NODE_ENV: ${{ github.event.inputs.testMode == 'true' && 'local' || 'production' }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin (tsup)
        run: npm run bundle

      - name: Inspect event payload (before)
        run: >-
          node -e "const fs=require('fs'); const p=process.env.GITHUB_EVENT_PATH;
          const o=JSON.parse(fs.readFileSync(p,'utf8'));
          const s=o.inputs?.eventPayload; const sn = typeof s==='string' ? s.slice(0,32) : '';
          const looksJson = typeof s==='string' && s.trim().startsWith('{');
          console.log(JSON.stringify({looksJson, type: typeof s, len: typeof s==='string'? s.length: null, head: sn}));"

      - name: Normalize event payload
        run: >-
          node -e "const fs=require('fs');const z=require('zlib');
          const p=process.env.GITHUB_EVENT_PATH; const obj=JSON.parse(fs.readFileSync(p,'utf8'));
          const s=obj.inputs && obj.inputs.eventPayload;
          if(typeof s==='string'){
            try{ z.brotliDecompressSync(Buffer.from(s,'base64')); }
            catch{ obj.inputs.eventPayload = z.brotliCompressSync(Buffer.from(s,'utf8')).toString('base64'); fs.writeFileSync(p, JSON.stringify(obj)); }
          }"

      - name: Inspect event payload (after)
        run: >-
          node -e "const fs=require('fs'); const p=process.env.GITHUB_EVENT_PATH;
          const o=JSON.parse(fs.readFileSync(p,'utf8'));
          const s=o.inputs?.eventPayload; const sn = typeof s==='string' ? s.slice(0,32) : '';
          const looksJson = typeof s==='string' && s.trim().startsWith('{');
          console.log(JSON.stringify({looksJson, type: typeof s, len: typeof s==='string'? s.length: null, head: sn}));"

      - name: Execute plugin
        run: node dist/action.js
        id: personal-agent
