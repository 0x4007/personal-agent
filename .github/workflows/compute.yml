name: "Personal Agent Compute"

on:
  workflow_dispatch:
    inputs:
      stateId:
        description: "State Id"
      eventName:
        description: "Event Name"
      eventPayload:
        description: "Event Payload"
      settings:
        description: "Settings"
      authToken:
        description: "Auth Token"
      ref:
        description: "Ref"
      signature:
        description: "The kernel signature"
      ubiquityKernelToken:
        description: "Kernel attestation token (optional)"
      command:
        description: "Command from the Kernel"
        required: false
      testMode:
        description: "Enable test mode (bypass signature verification)"
        type: boolean
        default: true

jobs:
  compute:
    name: "Personal Agent"
    runs-on: ubuntu-24.04
    permissions: write-all
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && 'main' || 'development' }}
    env:
      PLUGIN_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KERNEL_PUBLIC_KEY: ${{ secrets.KERNEL_PUBLIC_KEY }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
      AGENT_OWNER: ${{ github.repository_owner }}
      USER_PAT_FULL: ${{ secrets.PAT_FULL }}
      # Agent workflow target (override via secrets for forks/branches)
      UOS_AGENT_OWNER: ${{ secrets.UOS_AGENT_OWNER || github.repository_owner }}
      UOS_AGENT_REPO: ${{ secrets.UOS_AGENT_REPO || github.event.repository.name || 'personal-agent' }}
      UOS_AGENT_WORKFLOW: ${{ secrets.UOS_AGENT_WORKFLOW || 'agent.yml' }}
      UOS_AGENT_REF: ${{ secrets.UOS_AGENT_REF || '' }}
      PROMPT_FETCH_STYLE: "1"
      PROMPT_STYLE_SOURCE: "vector-db"
      UOS_VECTOR_DB_URL: ${{ secrets.UOS_VECTOR_DB_URL }}
      UOS_VECTOR_DB_KEY: ${{ secrets.UOS_VECTOR_DB_KEY }}
      UOS_AGENT_MEMORY_URL: ${{ secrets.UOS_AGENT_MEMORY_URL }}
      UOS_AGENT_MEMORY_KEY: ${{ secrets.UOS_AGENT_MEMORY_KEY }}
      # Prompt visibility for debugging
      LOG_PROMPT: "1"
      # Enable writing prompt/body/event files for artifact collection
      WRITE_PROMPT_FILE: "1"
      WRITE_EVENT_FILE: "1"
      NODE_ENV: ${{ github.event.inputs.testMode == 'true' && 'local' || 'production' }}

    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun src/index.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-logs-${{ github.run_id }}
          path: runtime-logs/**
