name: CI Build Dist

on:
  push:
    branches:
      - pi-integration
  workflow_dispatch: {}

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm i

      - name: Build
        run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.email "bot@local"
          git config user.name "ci-bot"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci: build dist [skip ci]"
          git push

