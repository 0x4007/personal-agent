name: "Bundle Dist"

on:
  push:
    branches:
      - "**"

jobs:
  build-and-commit:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build dist bundles
        run: |
          npm run bundle

      - name: Commit dist if changed (disable hooks)
        run: |
          if ! git diff --quiet -- dist; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist
            # Disable Husky/any hooks to avoid tooling requirements during CI commit
            git -c core.hooksPath=/dev/null commit -m "chore(dist): auto-bundle via CI [skip ci]"
            git push
          else
            echo "No dist changes to commit."
          fi
